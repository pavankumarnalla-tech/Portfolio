<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nalla Pavankumar - Portfolio</title>
    
    <!-- Load Tailwind CSS directly -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Load React directly -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Load Babel to understand JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Smooth scrolling for the whole page */
        html { scroll-behavior: smooth; }
        body { margin: 0; padding: 0; background-color: #020617; } /* slate-950 */
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- ICON COMPONENTS (Replacing lucide-react to work without npm) ---
        const IconGithub = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M15 22v-4a4.8 4.8 0 0 0-1-3.03c3.15-.38 6.5-1.4 6.5-7.a5.2 5.2 0 0 0-1.45-3.77 4.9 4.9 0 0 0-.14-3.72s-1.2-.38-3.9 1.48a13.38 13.38 0 0 0-7 0c-2.7-1.86-3.9-1.48-3.9-1.48a4.9 4.9 0 0 0-.14 3.72 5.2 5.2 0 0 0-1.45 3.77c0 5.6 3.35 6.6 6.5 7a4.8 4.8 0 0 0-1 3.03v4"/><path d="M9 20c-5 1.5-5-2.5-7-3"/></svg>;
        const IconLinkedin = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>;
        const IconMail = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>;
        const IconInstagram = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>;
        const IconChevronRight = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="9 18 15 12 9 6"/></svg>;
        const IconTerminal = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>;
        const IconCode2 = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m18 16 4-4-4-4"/><path d="m6 8-4 4 4 4"/><path d="m14.5 4-5 16"/></svg>;
        const IconDatabase = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>;
        const IconLayout = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>;
        const IconAward = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></svg>;
        const IconBookOpen = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>;
        const IconPalette = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="13.5" cy="6.5" r=".5"/><circle cx="17.5" cy="10.5" r=".5"/><circle cx="8.5" cy="7.5" r=".5"/><circle cx="6.5" cy="12.5" r=".5"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"/></svg>;
        const IconHeart = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>;

        // --- SUBCOMPONENTS ---
        const SectionHeading = ({ icon, title }) => (
            <div className="flex items-center gap-3 mb-10">
                <div className="p-2 rounded-lg bg-slate-800 border border-slate-700 text-slate-300">
                    {icon}
                </div>
                <h2 className="text-3xl font-bold text-white">{title}</h2>
            </div>
        );

        const TimelineItem = ({ year, title, institution, description, highlight }) => (
            <div className="relative pl-8 md:pl-12 group">
                <div className="absolute left-[-9px] top-1.5 w-4 h-4 rounded-full bg-slate-800 border-2 border-cyan-400 group-hover:bg-cyan-400 transition-colors shadow-[0_0_10px_rgba(34,211,238,0.4)]"></div>
                <div className="flex flex-col md:flex-row md:items-center justify-between gap-2 mb-2">
                    <h3 className="text-xl font-bold text-slate-200">{title}</h3>
                    <span className="inline-block px-3 py-1 rounded-full bg-slate-800 border border-slate-700 text-xs font-bold text-cyan-400 whitespace-nowrap">
                        {highlight}
                    </span>
                </div>
                <div className="text-cyan-500 font-medium mb-1">{institution}</div>
                <div className="text-sm text-slate-500 font-mono mb-3">{year}</div>
                <p className="text-slate-400 leading-relaxed">{description}</p>
            </div>
        );

        const SkillCard = ({ title, icon, skills }) => (
            <div className="bg-slate-900 border border-slate-800 rounded-xl p-6 hover:border-slate-700 transition-colors">
                <div className="flex items-center gap-3 mb-6 pb-4 border-b border-slate-800">
                    {icon}
                    <h3 className="text-lg font-bold text-white">{title}</h3>
                </div>
                <div className="flex flex-wrap gap-2">
                    {skills.map(skill => (
                        <span key={skill} className="px-3 py-1.5 rounded-md bg-slate-800/50 border border-slate-700 text-sm text-slate-300 hover:text-white hover:bg-slate-700 transition-colors">
                            {skill}
                        </span>
                    ))}
                </div>
            </div>
        );

        const AchievementCard = ({ rank, title, desc, color }) => (
            <div className="group relative bg-slate-900 border border-slate-800 rounded-xl p-6 overflow-hidden hover:-translate-y-1 transition-transform duration-300">
                <div className={`absolute top-0 left-0 w-full h-1 bg-gradient-to-r ${color}`}></div>
                <div className={`text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r ${color} mb-2`}>
                    {rank}
                </div>
                <h4 className="text-lg font-bold text-white mb-2">{title}</h4>
                <p className="text-sm text-slate-400">{desc}</p>
            </div>
        );

        // --- MAIN APP COMPONENT ---
        function App() {
            const [activeSection, setActiveSection] = useState('home');
            const [isScrolled, setIsScrolled] = useState(false);

            useEffect(() => {
                const handleScroll = () => {
                    setIsScrolled(window.scrollY > 50);
                    const sections = ['home', 'education', 'skills', 'projects', 'achievements'];
                    const current = sections.find(section => {
                        const element = document.getElementById(section);
                        if (element) {
                            const rect = element.getBoundingClientRect();
                            return rect.top <= 100 && rect.bottom >= 100;
                        }
                        return false;
                    });
                    if (current) setActiveSection(current);
                };

                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const scrollTo = (id) => {
                const element = document.getElementById(id);
                if (element) {
                    element.scrollIntoView({ behavior: 'smooth' });
                }
            };

            return (
                <div className="min-h-screen bg-slate-950 text-slate-200 font-sans selection:bg-cyan-500/30">
                    {/* Background Glow Effects */}
                    <div className="fixed inset-0 z-0 overflow-hidden pointer-events-none">
                        <div className="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-cyan-900/20 blur-[120px]"></div>
                        <div className="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-blue-900/20 blur-[120px]"></div>
                    </div>

                    {/* Navbar */}
                    <nav className={`fixed top-0 w-full z-50 transition-all duration-300 ${isScrolled ? 'bg-slate-950/80 backdrop-blur-md border-b border-slate-800 py-3' : 'bg-transparent py-5'}`}>
                        <div className="max-w-6xl mx-auto px-6 flex justify-between items-center">
                            <div className="text-xl font-bold tracking-tighter text-white flex items-center gap-2">
                                <IconTerminal className="w-6 h-6 text-cyan-400" />
                                <span>N.PavanKumar</span>
                            </div>
                            <div className="hidden md:flex gap-6 text-sm font-medium text-slate-400">
                                {['Home', 'Education', 'Skills', 'Projects', 'Achievements'].map((item) => (
                                    <button 
                                        key={item}
                                        onClick={() => scrollTo(item.toLowerCase())}
                                        className={`hover:text-cyan-400 transition-colors ${activeSection === item.toLowerCase() ? 'text-cyan-400' : ''}`}
                                    >
                                        {item}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </nav>

                    {/* Main Content */}
                    <main className="relative z-10 max-w-6xl mx-auto px-6 pt-32 pb-20 flex flex-col gap-32">
                        
                        {/* Hero Section */}
                        <section id="home" className="min-h-[80vh] flex flex-col justify-center items-start gap-6">
                            <div className="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-slate-800/50 border border-slate-700 text-cyan-400 text-sm font-medium mb-4 animate-pulse">
                                <span className="w-2 h-2 rounded-full bg-cyan-400"></span>
                                Open to Opportunities
                            </div>
                            <h1 className="text-5xl md:text-7xl font-bold tracking-tight text-white max-w-4xl leading-tight">
                                Hi, I'm <span className="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500">Nalla Pavankumar</span>.
                            </h1>
                            <p className="text-xl md:text-2xl text-slate-400 max-w-2xl leading-relaxed">
                                I'm a B.E. Information Technology student bridging the gap between <span className="text-slate-200 font-semibold">advanced software engineering</span> and <span className="text-slate-200 font-semibold">creative digital art</span>.
                            </p>
                            
                            <div className="flex flex-wrap gap-4 mt-8">
                                <button onClick={() => scrollTo('projects')} className="px-6 py-3 rounded-lg bg-cyan-500 text-slate-950 font-bold hover:bg-cyan-400 transition-colors flex items-center gap-2">
                                    View My Work <IconChevronRight className="w-4 h-4" />
                                </button>
                                <a href="https://github.com/pavankumarnalla-tech" target="_blank" rel="noreferrer" className="px-6 py-3 rounded-lg bg-slate-800 text-white font-medium hover:bg-slate-700 border border-slate-700 transition-colors flex items-center gap-2">
                                    <IconGithub className="w-5 h-5" /> GitHub
                                </a>
                                <a href="https://www.linkedin.com/in/pavankumar-nalla" target="_blank" rel="noreferrer" className="px-6 py-3 rounded-lg bg-slate-800 text-white font-medium hover:bg-slate-700 border border-slate-700 transition-colors flex items-center gap-2">
                                    <IconLinkedin className="w-5 h-5 text-blue-400" /> LinkedIn
                                </a>
                            </div>
                        </section>

                        {/* Education Timeline */}
                        <section id="education" className="scroll-mt-24">
                            <SectionHeading icon={<IconBookOpen className="w-6 h-6" />} title="Educational Journey" />
                            <div className="relative border-l border-slate-700 ml-3 md:ml-4 space-y-12">
                                <TimelineItem 
                                    year="2025 - Present"
                                    title="Bachelor of Engineering (B.E.) in Information Technology"
                                    institution="Chaitanya Bharathi Institute of Technology (CBIT)"
                                    description="Focusing on Data Structures, Object-Oriented Programming, and advanced IT systems."
                                    highlight="Current"
                                />
                                <TimelineItem 
                                    year="2022 - 2025"
                                    title="Diploma in Computer Science and Engineering"
                                    institution="Government Polytechnic Hyderabad"
                                    description="Specialized in software development lifecycles and database management. Consistently ranked among the top students."
                                    highlight="9.48/10 CGPA"
                                />
                                <TimelineItem 
                                    year="2022"
                                    title="Secondary School Certificate (SSC)"
                                    institution="ZPHS Begumpet"
                                    description="Achieved highest honors overall. Ranked School First and Mandal Second."
                                    highlight="9.7/10 CGPA"
                                />
                            </div>
                        </section>

                        {/* Skills Section */}
                        <section id="skills" className="scroll-mt-24">
                            <SectionHeading icon={<IconCode2 className="w-6 h-6" />} title="Technical Arsenal" />
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                <SkillCard 
                                    title="Languages" 
                                    icon={<IconTerminal className="w-6 h-6 text-cyan-400" />}
                                    skills={['C', 'C++', 'Java', 'Python', 'JavaScript (ES6+)', 'HTML5', 'CSS3']}
                                />
                                <SkillCard 
                                    title="Web & Databases" 
                                    icon={<IconDatabase className="w-6 h-6 text-blue-400" />}
                                    skills={['React.js', 'Responsive Design', 'MySQL', 'Relational DBs']}
                                />
                                <SkillCard 
                                    title="Tools & Platforms" 
                                    icon={<IconLayout className="w-6 h-6 text-purple-400" />}
                                    skills={['Visual Studio Code', 'Git', 'GitHub', 'Linux CLI']}
                                />
                            </div>
                        </section>

                        {/* Projects Section */}
                        <section id="projects" className="scroll-mt-24">
                            <SectionHeading icon={<IconLayout className="w-6 h-6" />} title="Featured Project" />
                            <div className="group relative bg-slate-800/40 border border-slate-700 rounded-2xl p-8 hover:bg-slate-800/60 transition-all duration-300 overflow-hidden">
                                <div className="absolute top-0 right-0 w-64 h-64 bg-cyan-500/10 rounded-full blur-3xl -mr-20 -mt-20 transition-transform group-hover:scale-110"></div>
                                
                                <div className="relative z-10 flex flex-col md:flex-row gap-8 justify-between">
                                    <div className="flex-1">
                                        <div className="flex items-center gap-3 mb-4">
                                            <h3 className="text-2xl font-bold text-white">Credit Card Fraud Detection using ML</h3>
                                            <span className="px-3 py-1 rounded-full bg-blue-500/20 text-blue-400 text-xs font-bold border border-blue-500/30">Academic</span>
                                        </div>
                                        <p className="text-slate-400 mb-6 leading-relaxed">
                                            Developed an advanced ensemble detection system utilizing <strong className="text-slate-200">SMOTE</strong> to balance heavily skewed financial datasets. Implemented a robust <strong className="text-slate-200">Weighted Voting Classifier</strong> to identify fraudulent transactions in real-time with high precision.
                                        </p>
                                        <div className="space-y-3 mb-8">
                                            <div className="flex items-start gap-2 text-sm text-slate-300">
                                                <IconChevronRight className="w-4 h-4 text-cyan-400 mt-1 flex-shrink-0" />
                                                <span>Evaluated and compared: Logistic Regression, Decision Trees, Random Forest, and KNN.</span>
                                            </div>
                                            <div className="flex items-start gap-2 text-sm text-slate-300">
                                                <IconChevronRight className="w-4 h-4 text-cyan-400 mt-1 flex-shrink-0" />
                                                <span>Conducted extensive feature engineering and performance analysis using Pandas, Scikit-Learn, and NumPy.</span>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <div className="w-full md:w-1/3 flex flex-col gap-3">
                                        <h4 className="text-sm font-semibold text-slate-500 uppercase tracking-wider mb-2">Tech Stack</h4>
                                        {['Python', 'Scikit-Learn', 'Pandas', 'NumPy', 'SMOTE', 'Ensemble ML'].map(tech => (
                                            <div key={tech} className="flex items-center gap-2 bg-slate-900/50 border border-slate-700/50 px-4 py-2 rounded-lg text-sm text-slate-300">
                                                <IconCode2 className="w-4 h-4 text-slate-500" /> {tech}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </section>

                        {/* Achievements Section */}
                        <section id="achievements" className="scroll-mt-24">
                            <SectionHeading icon={<IconAward className="w-6 h-6" />} title="Milestones & Ranks" />
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                                <AchievementCard rank="96th" title="TG ECET 2025" desc="State Rank in Engineering Common Entrance Test" color="from-cyan-500 to-blue-500" />
                                <AchievementCard rank="82nd" title="TG POLYCET 2022" desc="State Rank in Polytechnic Entrance Test" color="from-blue-500 to-indigo-500" />
                                <AchievementCard rank="9.48" title="Diploma CGPA" desc="Maintained superior academic excellence throughout 3 years" color="from-indigo-500 to-purple-500" />
                                <AchievementCard rank="Top 1" title="SSC Honors" desc="School 1st and Mandal 2nd with 9.7 CGPA" color="from-purple-500 to-pink-500" />
                            </div>
                        </section>

                        {/* Beyond Code */}
                        <section id="beyond-code" className="scroll-mt-24 border-t border-slate-800 pt-20">
                            <SectionHeading icon={<IconPalette className="w-6 h-6" />} title="Beyond The Code" />
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                <div className="bg-slate-800/30 border border-slate-700 rounded-2xl p-8">
                                    <div className="flex items-center gap-4 mb-6">
                                        <div className="p-3 rounded-xl bg-pink-500/20 text-pink-400">
                                            <IconPalette className="w-6 h-6" />
                                        </div>
                                        <div>
                                            <h3 className="text-xl font-bold text-white">Digital Art & Painting</h3>
                                            <a href="https://instagram.com/the.souls.canvas" target="_blank" rel="noreferrer" className="text-sm text-pink-400 hover:text-pink-300 flex items-center gap-1 mt-1">
                                                <IconInstagram className="w-4 h-4" /> @the.souls.canvas
                                            </a>
                                        </div>
                                    </div>
                                    <p className="text-slate-400 leading-relaxed">
                                        I practice traditional and digital painting to enhance visual composition and problem-solving skills. I manage a professional art channel showcasing original work and creative processes, bringing a unique design perspective to my technical projects.
                                    </p>
                                </div>

                                <div className="bg-slate-800/30 border border-slate-700 rounded-2xl p-8">
                                    <div className="flex items-center gap-4 mb-6">
                                        <div className="p-3 rounded-xl bg-emerald-500/20 text-emerald-400">
                                            <IconHeart className="w-6 h-6" />
                                        </div>
                                        <div>
                                            <h3 className="text-xl font-bold text-white">Community Leadership</h3>
                                            <span className="text-sm text-emerald-400 mt-1 block">NSS Volunteer</span>
                                        </div>
                                    </div>
                                    <p className="text-slate-400 leading-relaxed">
                                        Active National Service Scheme (NSS) volunteer at CBIT, continuing a 3-year tenure from my Diploma. I've organized digital literacy workshops and health awareness camps, striving to make a tangible impact in local communities.
                                    </p>
                                </div>
                            </div>
                        </section>
                    </main>

                    {/* Footer */}
                    <footer className="border-t border-slate-800 bg-slate-950 py-12 mt-20">
                        <div className="max-w-6xl mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-6">
                            <div className="text-slate-500 text-sm">
                                © {new Date().getFullYear()} Nalla Pavankumar. All rights reserved.
                            </div>
                            <div className="flex gap-4">
                                <a href="mailto:pavankumarnalla.official@gmail.com" className="p-2 rounded-full bg-slate-900 border border-slate-800 hover:border-slate-600 text-slate-400 hover:text-white transition-all"><IconMail className="w-5 h-5" /></a>
                                <a href="https://github.com/pavankumarnalla-tech" target="_blank" rel="noreferrer" className="p-2 rounded-full bg-slate-900 border border-slate-800 hover:border-slate-600 text-slate-400 hover:text-white transition-all"><IconGithub className="w-5 h-5" /></a>
                                <a href="https://www.linkedin.com/in/pavankumar-nalla" target="_blank" rel="noreferrer" className="p-2 rounded-full bg-slate-900 border border-slate-800 hover:border-slate-600 text-slate-400 hover:text-white transition-all"><IconLinkedin className="w-5 h-5" /></a>
                                <a href="https://instagram.com/the.souls.canvas" target="_blank" rel="noreferrer" className="p-2 rounded-full bg-slate-900 border border-slate-800 hover:border-slate-600 text-slate-400 hover:text-white transition-all"><IconInstagram className="w-5 h-5" /></a>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        }

        // Render the app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
